function MetaTag({ children, accent = false }) {
  return (
    <span style={{
      display: "inline-block",
      background: accent ? t.accentFill : t.surface1,
      border: `1px solid ${accent ? t.accentBorder : t.borderSoft}`,
      color: accent ? t.accentInk : t.inkTertiary,
      fontFamily: FONT_MONO, fontSize: 11, padding: "3px 9px",
      borderRadius: 3, letterSpacing: 0.3, whiteSpace: "nowrap",
    }}>{children}</span>
  );
}

function SectionRule() {
  return <div style={{
    height: 1,
    background: `linear-gradient(90deg, ${t.borderMedium} 0%, ${t.borderSoft} 60%, transparent 100%)`,
    margin: "0 0 2.5rem",
  }} />;
}

function CategoryDot({ category }) {
  const map = { voice: t.accentBorder, worksheet: t.borderStrong, tool: t.inkTertiary };
  return <span style={{
    display: "inline-block", width: 6, height: 6, borderRadius: "50%",
    background: map[category] || t.borderMedium, marginRight: 8, verticalAlign: "middle",
  }} />;
}

  const [expandedCards, setExpandedCards] = useState(() => new Set());

  const visibleFactories = useMemo(() => {
    if (activeCategory === "all") return FACTORIES;
    return FACTORIES.filter(f => f.category === activeCategory);
  }, [activeCategory]);

  const toggleCard = (id) => {
    setExpandedCards(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  return (
    <div style={{
      background: t.paper, minHeight: "100vh", color: t.inkSecondary,
      fontFamily: FONT_SANS, WebkitFontSmoothing: "antialiased", MozOsxFontSmoothing: "grayscale",
    }}>
      <style>{`
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: ${t.borderMedium}; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        body { margin: 0; }
        a { color: inherit; }
        button { font-family: inherit; }
      `}</style>

      <main style={{ maxWidth: 880, margin: "0 auto", padding: "64px 28px 0" }}>
        <PageHeader />
        <SectionRule />
        <SectionHeading eyebrow="The seven" title="Instances"
          lede="Each card opens to reveal the domain corpus, agent cast, curriculum shape, and links to live deployments, repos, and cheat sheets." />
        <CategoryFilter active={activeCategory} onChange={setActiveCategory} />
        <div>
          {visibleFactories.map(f => (
            <FactoryCard key={f.id} factory={f}
              expanded={expandedCards.has(f.id)} onToggle={() => toggleCard(f.id)} />
          ))}
        </div>
        <ArchitectureSection />
        <ApplicationStack />
        <DevOpsStack />
        <ContributionStack />
        <StackAndPorts />
        <Footer />
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FactoryHub />);
</script>
</body>
</html>
